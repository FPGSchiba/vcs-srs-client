name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            binary: vcs-client
          - platform: linux-amd64
            runner: ubuntu-latest
            binary: vcs-client
          - platform: windows-amd64
            runner: windows-latest
            binary: vcs-client.exe
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GUI deps
        if: matrix.platform == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.96

      - name: Generate TypeScript bindings
        run: wails3 generate bindings -ts -clean=true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build app
        run: wails3 task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vcs-client-${{ matrix.platform }}
          path: bin/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Draft Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename per-platform binaries
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for file in "$dir"*; do
              ext="${file##*.}"
              if [ "$ext" = "exe" ]; then
                cp "$file" "release/${name}.exe"
              else
                cp "$file" "release/${name}"
              fi
            done
          done
          ls -la release/

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: release/*
          generate_release_notes: true
