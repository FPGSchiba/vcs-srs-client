name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Wails v3 (alpha.96) links against GTK4 + WebKitGTK 6.0 on Linux. The
      # race-enabled `go test ./...` and `go build` compile the main package,
      # which imports the Wails application (cgo), so these dev headers must be
      # present or pkg-config fails on gtk4 / webkitgtk-6.0.
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.47.2

      - name: Generate proto bindings
        run: buf generate

      # main.go has `//go:embed all:frontend/dist`. The real bundle is produced
      # by the frontend job; here we only need any file present so the Go
      # packages compile for vet/test/build.
      - name: Provide embed placeholder for frontend/dist
        run: |
          mkdir -p frontend/dist
          echo '<!doctype html><title>ci</title>' > frontend/dist/index.html

      - name: Go vet
        run: go vet ./...

      - name: Go test (race)
        run: go test -race ./...

      - name: Go build
        run: go build -o /tmp/vcs-client .

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
